export default {
  async fetch(request, env) {
    const userAgent = request.headers.get("User-Agent") || "";

    // 1. DISPATCH FROM TELEGRAM (You -> GitHub)
    if (userAgent.includes("Telegram")) {
      const body = await request.json();
      const text = body.message?.text || "";

      if (text.startsWith("Force Preview:")) {
        const directive = text.split(":")[1]?.trim() || "Nexus";
        
        const ghReq = await fetch(`https://api.github.com/repos/XULPLAB/VeilboundGame/dispatches`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${env.GH_PAT}`,
            "Accept": "application/vnd.github.v3+json",
            "User-Agent": "XULPLAB-Commander",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            event_type: "world_gen_deploy",
            client_payload: { commander_directive: directive }
          })
        });

        return new Response(JSON.stringify({
          method: "sendMessage",
          chat_id: env.COMMANDER_CHAT_ID,
          text: `📡 BRIDGE ONLINE: GH_${ghReq.status}\nDirective: ${directive}`
        }), { headers: { "Content-Type": "application/json" } });
      }
    }

    // 2. RETURN FROM GITHUB (GitHub -> You)
    if (userAgent.includes("Artisan")) {
      const data = await request.json();
      if (data.image_url) {
        await fetch(`https://api.telegram.org/bot${env.BOT_TOKEN}/sendPhoto`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: env.COMMANDER_CHAT_ID,
            photo: data.image_url,
            caption: `🔱 ARTISAN: ${data.message}`
          })
        });
      }
      return new Response("OK", { status: 200 });
    }

    return new Response("GATEWAY_READY", { status: 200 });
  }
};
