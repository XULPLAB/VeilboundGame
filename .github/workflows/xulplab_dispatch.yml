name: XULPLAB World Fade
on:
  repository_dispatch:
    types: [world_gen_deploy, telegram_cmd]

jobs:
  execute_fade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log Commander Directive
        run: |
          echo "Commander Sign-off: ${{ github.event.client_payload.commander_directive }}"
          echo "Targeting: ${{ github.event.client_payload.biome_target }}"

      - name: Deploy Flat Indigo Skin
        run: |
          echo "Starting General World Push for Lexington..."
          echo "Applying Castlewood Park Biome Overlay..."
          # Artisan scripts would trigger here to build the scene

      - name: Return Universal Preview
        run: |
          # Replace 'your-worker-name.subdomain.workers.dev' with your actual Worker URL
          curl -X POST https://your-worker-name.subdomain.workers.dev \
          -H "Content-Type: application/json" \
          -d '{
            "image_url": "https://raw.githubusercontent.com/${{ github.repository }}/main/assets/previews/castlewood_nexus.png", 
            "message": "PREVIEW: ${{ github.event.client_payload.commander_directive }}"
          }'
