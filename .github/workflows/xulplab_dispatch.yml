name: XULPLAB World Fade
on:
  repository_dispatch:
    types: [world_gen_deploy, telegram_cmd]

jobs:
  execute_fade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log Commander Directive
        run: |
          echo "Commander Sign-off: ${{ github.event.client_payload.commander_directive }}"

      - name: Deploy Flat Indigo Skin
        run: |
          echo "Starting General World Push for Lexington..."
          # Artisan build logic executes here

      - name: Return Universal Preview
        run: |
          curl -X POST "https://veilbound-artisan-webhook.veilboundgame.workers.dev" \
          -H "Content-Type: application/json" \
          -H "User-Agent: XULPLAB-Artisan-Render" \
          -d '{
            "image_url": "https://raw.githubusercontent.com/XULPLAB/VeilboundGame/main/assets/previews/castlewood_nexus.png", 
            "message": "PREVIEW: ${{ github.event.client_payload.commander_directive }}"
          }'
