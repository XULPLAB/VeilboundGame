name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM Update
    - cron: '0 1 * * *'  # 9:00 PM Update
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied: Guardian Protocol Active."
            exit 1
          fi

      - name: Execute Sovereign Core
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pass the command to the agents
          python3 agents/sentinel.py "$CMD_TEXT"
          python3 agents/envoy.py

      - name: Commit to Ledger & World Push
        env:
          PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          
          # Stage all changes (Ledger updates, Grid changes, etc.)
          git add .
          
          # Only commit if there are actual changes to avoid "Nothing to commit" errors
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update & Ledger Synchronization"
            
            # The Fix: Authenticate the push using the PAT in the URL
            git remote set-url origin https://x-access-token:${PAT}@github.com/${{ github.repository }}.git
            git push origin main
          else
            echo "No changes detected in World Grid or Ledger."
          fi
