name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM
    - cron: '0 1 * * *'  # 9:00 PM
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          persist-credentials: false 

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied."
            exit 1
          fi

      - name: Execute Sovereign Core
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 agents/sentinel.py "$CMD_TEXT"
          python3 agents/envoy.py

      - name: Commit & World Push
        env:
          MY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. THE MANUAL OVERRIDE: 
          # This forces Git to use your token for EVERY request to github.com
          git config --global url."https://x-access-token:${MY_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # 2. Identity Setup
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          
          # 3. Stage and Push
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update & Ledger Synchronization"
            # We use 'origin main' explicitly to avoid any ambiguity
            git push origin main
          else
            echo "No changes detected. Standing by."
          fi
