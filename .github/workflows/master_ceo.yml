name: XULPLAB Master CEO - APEX GENESIS

on:
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  coordinate_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
          # Ensuring Python is ready for the agents
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          # This installs the missing 'requests' module
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Sentinel (Manual Override Fix)
        id: sentinel
        run: |
          RESPONSE=$(python3 agents/sentinel.py "#Deploy Shader")
          echo "AGENT_RESPONSE=$RESPONSE" >> $GITHUB_ENV

      - name: Sync and Push Changes
        run: |
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplab.com"
          git add .
          if ! git diff --cached --quiet; then
            git fetch origin main
            git rebase origin main
            git commit -m "APEX GENESIS: Shader & Build Sync [Run ${{ github.run_number }}]"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Envoy Feedback
        if: env.AGENT_RESPONSE != '' && env.AGENT_RESPONSE != 'None'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 agents/envoy.py "${{ env.AGENT_RESPONSE }}"
