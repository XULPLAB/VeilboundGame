name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM
    - cron: '0 1 * * *'  # 9:00 PM
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          # Use your PAT for the initial checkout
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied: Guardian Protocol Active."
            exit 1
          fi

      - name: Execute Sovereign Core
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Ensure these files exist to avoid 'file not found' errors
          python3 agents/sentinel.py "$CMD_TEXT"
          python3 agents/envoy.py

      - name: Commit & World Push
        run: |
          # 1. Identity Setup
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          
          # 2. THE DUAL-KEY FIX: Use the automatic GITHUB_TOKEN for the push
          # This avoids the "Username" prompt because it's an internal system token
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # 3. Stage and Push
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update & Ledger Synchronization"
            git push origin main
          else
            echo "No changes detected. Standing by."
          fi
