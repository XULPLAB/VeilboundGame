name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM
    - cron: '0 1 * * *'  # 9:00 PM
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          # This is the secret fix: Disables the locked-in local credentials
          persist-credentials: false 

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied."
            exit 1
          fi

      - name: Execute Sovereign Core
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # These scripts update your files (Ledger/Grid)
          python3 agents/sentinel.py "$CMD_TEXT"
          python3 agents/envoy.py

      - name: Commit & World Push
        env:
          # Use your Master Key for this step
          MY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          
          git add .
          
          # Only push if changes exist
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update & Ledger Synchronization"
            
            # THE BRUTE FORCE FIX:
            # We push directly to the authenticated URL, bypassing the 'origin' memory
            git push "https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No changes detected. Grid stable."
          fi
