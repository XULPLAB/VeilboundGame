name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied."
            exit 1
          fi

      - name: Execute Sovereign Core
        id: run_agents
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
        run: |
          pip install requests
          # Run Sentinel and capture the output
          # If Sentinel returns nothing, AGENT_RESPONSE will be empty
          python3 agents/sentinel.py "$CMD_TEXT" > response.txt
          echo "AGENT_RESPONSE=$(cat response.txt | tr -d '\n')" >> $GITHUB_ENV

      - name: Commit & World Push
        env:
          MY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          git config --global url."https://x-access-token:${MY_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update - $GITHUB_RUN_NUMBER"
            git push origin main
          else
            echo "No changes to the world state."
          fi

      - name: Envoy Feedback
        # This condition prevents the "No command detected" loop
        if: env.AGENT_RESPONSE != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 agents/envoy.py "${{ env.AGENT_RESPONSE }}"
