name: XULPLAB Master CEO - APEX GENESIS

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM
    - cron: '0 1 * * *'  # 9:00 PM
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  apex_operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          persist-credentials: false 

      - name: Architect Verification
        run: |
          if [ "${{ github.event.client_payload.chat_id }}" != "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Access Denied: Architect ID Mismatch."
            exit 1
          fi

      - name: Setup & Execute Agents
        env:
          CMD_TEXT: ${{ github.event.client_payload.text }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARCHITECT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Install necessary communication libraries
          pip install requests
          
          # 2. Run Sentinel to process commands and update the local ledger files
          python3 agents/sentinel.py "$CMD_TEXT"
          
          # 3. Run Envoy to report back to the Architect on Telegram
          python3 agents/envoy.py "🔱 XULPLAB STATUS: Grid Synchronized. World Build #$GITHUB_RUN_NUMBER is active. Ready to drop Castlewood Tower."

      - name: Commit & World Push
        env:
          MY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Identity Setup
          git config --global user.name "Master CEO"
          git config --global user.email "ceo@xulplabs.com"
          
          # Stage changes (Sentinel/Envoy may have modified the Ledger or JSONs)
          git add .
          
          # Only push if changes exist (prevents failure on empty runs)
          if ! git diff-index --quiet HEAD; then
            git commit -m "APEX GENESIS: World Build Update & Ledger Synchronization"
            # The Brute Force URL fix to bypass the Exit 128 "Username" prompt
            git push "https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No changes to commit. Infrastructure is stable."
          fi
