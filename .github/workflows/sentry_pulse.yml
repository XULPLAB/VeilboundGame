name: Sentry Pulse - Asset Sync & Dispatch

on:
  push:
    paths:
      - 'assets/textures/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coordinate_assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Asset Type and Dispatch
        id: detector
        run: |
          # Identify if the new file is a creature sheet or a prism sheet
          if git diff --name-only HEAD^ HEAD | grep -q "creatures/.*sheet"; then
            echo "target=creatures" >> $GITHUB_OUTPUT
            echo "trigger=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -q "prisms/.*sheet"; then
            echo "target=prisms" >> $GITHUB_OUTPUT
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Conflict Resolver Commit & Push
        run: |
          git config --global user.name "XULPLAB-Sentry"
          git config --global user.email "sentry@xulplabs.com"
          
          # Stage all changes
          git add .
          
          # Conflict Resolver: Try to push up to 5 times if the branch moves
          if [ -n "$(git status --porcelain)" ]; then
            n=0
            until [ "$n" -ge 5 ]
            do
              git pull --rebase origin main && \
              git commit -m "📡 Sentry: Syncing Asset Manifest" && \
              git push origin main && break
              n=$((n+1))
              echo "Collision detected. Retrying in 5s... (Attempt $n)"
              sleep 5
            done
          else
            echo "No sync required."
          fi

      - name: Trigger Artisan V2 Handshake
        if: steps.detector.outputs.trigger == 'true'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger_artisan_slice
          client-payload: '{"type": "${{ steps.detector.outputs.target }}"}'

      - name: Sentry Report
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="<b>📡 SENTRY PULSE: STATUS UPDATE</b>%0AStatus: ${{ job.status }}%0AHandshake Sent: ${{ steps.detector.outputs.trigger }}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="${CHAT_ID}" -d parse_mode="HTML" -d text="$TEXT"
