name: Cloud Sentry Pulse

on:
  push:
    paths:
      - 'CEO_DIRECTIVES.md'
  schedule:
    - cron: '0 13 * * *'  # 9:00 AM EST (Morning Update)
    - cron: '0 17 * * *'  # 1:00 PM EST (Mid-Day Update)
    - cron: '0 1 * * *'   # 9:00 PM EST (Night Update)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apex_genesis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Master CEO Sovereign Command
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(git log -1 --pretty=%B || echo "Manual Trigger")
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="<b>🔱 MASTER CEO: APEX GENESIS ACTIVE</b>
          
          <b>[SYSTEM STATUS]</b>
          Engine: Node.js 24 (Optimized)
          Rhythm: 09:00 / 13:00 / 21:00 EST
          
          <b>[WORLD ARCHITECTURE]</b>
          - Incursions: Order of Qwen 'Gold Q' Logic Active
          - Mapping: 1:1 Geospatial (5-Decimal GPS)
          - Battery: Accessory Socket Rendering Engaged
          
          <b>[DIRECTIVE UPDATE]</b>
          <i>$MSG</i>
          
          <b>STATUS: 200 OK - ULTIMATE SOVEREIGN COMMAND ENGAGED</b>"
