name: Cloud Sentry Pulse

on:
  push:
    paths:
      - 'CEO_DIRECTIVES.md'
  repository_dispatch:
    types: [telegram_cmd]
  workflow_dispatch:

# Grant write permissions so the bot can save the images
permissions:
  contents: write

jobs:
  sentinel_asset_sync:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history to allow rebasing
- name: Master CEO Confirmation
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="<b>🔱 MASTER CEO: ASSET REGISTERED</b>
          
          <b>[SENTINEL REPORT]</b>
          Target: <code>assets/textures/prisms</code>
          Status: Manifest Locked. Crystal assets registered.
          
          <i>The Lexington Alpha build is being updated...</i>"      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute Sentinel Logic
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python3 agents/sentinel.py

      - name: Commit and Push Assets
        run: |
          git config --global user.name "XULPLAB-Sentinel"
          git config --global user.email "ceo@xulplabs.com"
          
          # Stage the new textures
          git add assets/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sentinel: Asset Sync [Build Update]"
            
            # Rebase to pull latest changes (prevents 'remote rejected' error)
            git pull --rebase origin main
            git push origin main
          else
            echo "No new assets to commit."
          fi
