name: Cloud Sentry Pulse

on:
  push:
    paths:
      - 'CEO_DIRECTIVES.md'
  repository_dispatch:
    types: [telegram_cmd]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sentinel_asset_sync:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute Sentinel Logic
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python3 agents/sentinel.py

      - name: Commit and Push Assets
        run: |
          git config --global user.name "XULPLAB-Sentinel"
          git config --global user.email "ceo@xulplabs.com"
          git add assets/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🔱 Sentinel: Asset Sync [Waystops/Prisms]"
            git push origin main
          else
            echo "No new assets to commit."
          fi
