name: Artisan V2 - Vision Slicer & BG Removal

on:
  repository_dispatch:
    types: [trigger_artisan_slice]
  workflow_dispatch: # Allows you to trigger this manually from your iPhone/GitHub Actions tab

permissions:
  contents: write   # CRITICAL FIX: Explicitly allows the bot to commit files
  actions: write    # Allows the bot to talk to other workflows

jobs:
  vision_slice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Fix Dependencies & Environment
        run: |
          pip install Pillow rembg onnxruntime
          # Pre-create all necessary Godot and Asset directories
          mkdir -p assets/textures/creatures
          mkdir -p assets/textures/prisms
          mkdir -p res/shaders
          mkdir -p res/scripts
          mkdir -p agents
          # Add .gitkeep to ensure Git tracks empty folders
          touch assets/textures/creatures/.gitkeep
          touch assets/textures/prisms/.gitkeep
          touch res/shaders/.gitkeep
          touch res/scripts/.gitkeep

      - name: Run Adaptive Slicer & AI BG Remover
        # This calls the agent script we created in Step 2
        run: python3 agents/artisan_logic.py

      - name: Commit and Push Game-Ready Assets
        run: |
          git config --global user.name "XULPLAB-Artisan"
          git config --global user.email "ceo@xulplabs.com"
          
          # Add all new assets and the new folder structures
          git add assets/ res/ agents/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🔱 Artisan: Assets Prepped (BG Removed & Sliced) + Folders Initialized"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected. Board is already clean."
          fi

      - name: Master CEO Telegram Report
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            TEXT="<b>🔱 MASTER CEO: ARTISAN SUCCESS</b>%0A%0AStatus: 200 OK%0AAction: 21-Unit Slicing & BG Removal Complete.%0A<i>Folders res/shaders and res/scripts are now live.</i>"
          else
            TEXT="<b>⚠️ MASTER CEO: ARTISAN FAILURE</b>%0A%0AStatus: 500 ERROR%0A<i>Check 'Run Adaptive Slicer' logs for Python or Permission errors.</i>"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="$TEXT"
