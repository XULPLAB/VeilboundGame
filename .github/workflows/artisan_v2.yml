name: Artisan Visual Pipeline

on:
  push:
    paths:
      - 'assets/uploads/**'
  workflow_dispatch:

jobs:
  ping_architect:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="<b>🔱 [ARTISAN] PIPELINE ACTIVE</b>%0A%0AArchitect <b>VeilboundGame</b> detected in Lexington.%0A%0A✅ System Link: <b>STABLE</b>"
