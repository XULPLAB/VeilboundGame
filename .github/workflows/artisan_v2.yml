name: Artisan V2 - Vision Slicer & BG Removal

on:
  repository_dispatch:
    types: [trigger_artisan_slice]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vision_slice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Game-Ready Prep Tools
        run: |
          # Install Pillow for slicing, rembg for AI background removal, 
          # and onnxruntime for the processing engine.
          pip install Pillow rembg onnxruntime

      - name: Run Adaptive Slicer & AI BG Remover
        # This executes the Python logic we will build in Step 2
        run: python3 agents/artisan_logic.py

      - name: Commit and Push Prepped Assets
        id: commit_assets
        run: |
          git config --global user.name "XULPLAB-Artisan"
          git config --global user.email "ceo@xulplabs.com"
          git add assets/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🔱 Artisan: Assets Prepped (BG Removed & Sliced)"
            git pull --rebase origin main
            git push origin main
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected."
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Master CEO Report
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Determine status message
          if [ "${{ job.status }}" == "success" ]; then
            TEXT="<b>🔱 MASTER CEO: ARTISAN FINALIZED</b>%0A%0AStatus: 200 OK%0AAction: BG Removal & 21-Unit Slicing Complete.%0A<i>Assets are now Game-Ready for the Lexington Build.</i>"
          else
            TEXT="<b>⚠️ MASTER CEO: ARTISAN FAILURE</b>%0A%0AStatus: 500 ERROR%0A<i>Check logs for rembg/onnx threading issues.</i>"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="$TEXT"
